# Render Blueprint — deploys MagicVault as a single web service (FastAPI serves
# the React SPA + API on one origin) plus managed Postgres and Redis.
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy: push this repo to GitHub, then in the Render dashboard:
#   New + → Blueprint → connect this repo. Render reads this file and creates
#   all three resources. See DEPLOY.md for the full step-by-step.

databases:
  - name: magicvault-db
    databaseName: magicvault
    user: magicvault
    plan: free # free Postgres expires after ~30 days; upgrade to keep it

services:
  # Managed Redis (used as a best-effort Scryfall cache; app works without it)
  - type: redis
    name: magicvault-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # internal access only

  # Backend + bundled frontend
  - type: web
    name: magicvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free # free web spins down after inactivity; upgrade for always-on
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magicvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: magicvault-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render generates a strong secret
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://vaultspell.com,https://www.vaultspell.com,https://magicvault.onrender.com
      - key: APP_URL
        # Base URL used in password-reset links (must be the public URL).
        value: https://vaultspell.com
      - key: RESEND_API_KEY
        sync: false # set in the Render dashboard; empty = reset links only logged
      - key: EMAIL_FROM
        value: VaultSpell <noreply@vaultspell.com>
