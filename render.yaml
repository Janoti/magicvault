# Render Blueprint — deploys MagicVault as a single web service (FastAPI serves
# the React SPA + API on one origin) plus managed Postgres and Redis.
# Docs: https://render.com/docs/blueprint-spec
#
# To deploy: push this repo to GitHub, then in the Render dashboard:
#   New + → Blueprint → connect this repo. Render reads this file and creates
#   all three resources. See DEPLOY.md for the full step-by-step.

databases:
  - name: magicvault-db
    databaseName: magicvault
    user: magicvault
    plan: free # free Postgres expires after ~30 days; upgrade to keep it

services:
  # Managed Redis (used as a best-effort Scryfall cache; app works without it)
  - type: redis
    name: magicvault-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # internal access only

  # Backend + bundled frontend
  - type: web
    name: magicvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free # free web spins down after inactivity; upgrade for always-on
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: magicvault-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: magicvault-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render generates a strong secret
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://vaultspell.com,https://www.vaultspell.com,https://magicvault.onrender.com
      - key: APP_URL
        # Base URL used in password-reset links (must be the public URL).
        value: https://vaultspell.com
      - key: RESEND_API_KEY
        sync: false # set in the Render dashboard; empty = reset links only logged
      - key: EMAIL_FROM
        value: VaultSpell <noreply@vaultspell.com>
      - key: ADMIN_EMAIL
        sync: false # set to your account email in the dashboard to become admin
      - key: STRIPE_SECRET_KEY
        sync: false # sk_test_... / sk_live_... (set in dashboard)
      - key: STRIPE_PRICE_ID
        value: price_1TeEVoFUHB1cWMRqfNfV9gSq # monthly subscription (R$10)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # whsec_... from the Stripe webhook (set in dashboard)
      # AI Deck Doctor — set ONE provider. Claude is preferred if both are set.
      - key: ANTHROPIC_API_KEY
        sync: false # sk-ant-... Claude key (set in dashboard)
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001 # cheap & good; or claude-sonnet-4-6
      - key: XAI_API_KEY
        sync: false # xai-... Grok key (alternative to Claude)
      - key: XAI_MODEL
        value: grok-3 # change to a model your xAI account can access
