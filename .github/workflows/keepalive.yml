name: Keep Render awake

# Pings the health endpoint so the free Render web service doesn't spin down
# after 15 min of inactivity. Also runnable manually.
on:
  schedule:
    - cron: "*/13 * * * *"   # every 13 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 30 https://vaultspell.com/api/health || true
