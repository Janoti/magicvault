version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: magicvault_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-magicvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magicvault123}
      POSTGRES_DB: ${POSTGRES_DB:-magicvault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-magicvault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: magicvault_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magicvault_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-magicvault}:${POSTGRES_PASSWORD:-magicvault123}@postgres:5432/${POSTGRES_DB:-magicvault}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production_please}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:80}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: magicvault_ui
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: magicvault_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
